<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Finance Perso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABmCu61-jScR4yDAqFKJ_RXwcKAmok4pg",
            authDomain: "banque-3fd70.firebaseapp.com",
            projectId: "banque-3fd70",
            storageBucket: "banque-3fd70.firebasestorage.app",
            messagingSenderId: "892055695539",
            appId: "1:892055695539:web:731b02c49224949ba1c0c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const opsCollection = collection(db, "operations");

        // Enregistrement d'une opération
        window.saveOperation = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const op = {
                date: document.getElementById('date').value,
                libelle: document.getElementById('libelle').value,
                montant: parseFloat(document.getElementById('montant').value),
                categorie: document.getElementById('categorie').value,
                createdAt: new Date().toISOString()
            };

            try {
                await addDoc(opsCollection, op);
                document.getElementById('opForm').reset();
                document.getElementById('date').valueAsDate = new Date();
                alert("Opération enregistrée !");
            } catch (error) {
                console.error("Erreur:", error);
                alert("Erreur lors de l'enregistrement.");
            } finally {
                btn.disabled = false;
            }
        };

        // Lecture en temps réel des 20 dernières opérations
        const q = query(opsCollection, orderBy("date", "desc"), limit(20));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('recentOps');
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const montant = parseFloat(data.montant || 0);
                const row = `
                    <tr class="border-b text-sm">
                        <td class="p-2">${data.date}</td>
                        <td class="p-2 font-medium">${data.libelle}</td>
                        <td class="p-2 ${montant < 0 ? 'text-red-600' : 'text-green-600'} font-bold">
                            ${montant.toFixed(2)}€
                        </td>
                        <td class="p-2 text-gray-500">${data.categorie || ''}</td>
                    </tr>`;
                list.innerHTML += row;
            });
        });

        window.onload = () => { document.getElementById('date').valueAsDate = new Date(); };
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">Mon Portefeuille</h1>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <form id="opForm" onsubmit="saveOperation(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="date" required class="w-full border rounded-lg p-2 text-sm">
                    <input type="number" step="0.01" id="montant" placeholder="Montant (ex: -15.50)" required class="w-full border rounded-lg p-2 text-sm">
                </div>
                <input type="text" id="libelle" placeholder="Libellé de l'opération" required class="w-full border rounded-lg p-2 text-sm">
                <select id="categorie" class="w-full border rounded-lg p-2 text-sm bg-white">
                    <option>Alimentaire</option>
                    <option>Loisirs</option>
                    <option>Santé</option>
                    <option>Logement</option>
                    <option>Transport</option>
                    <option>Revenus</option>
                    <option>Autre</option>
                </select>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                    Ajouter l'opération
                </button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 border-b bg-slate-50 font-bold text-slate-700 text-sm">Derniers flux</div>
            <table class="w-full text-left border-collapse">
                <tbody id="recentOps">
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
